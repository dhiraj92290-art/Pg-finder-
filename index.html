<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PG Finder - Janakpuri West</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
<h1>PG Finder</h1>
<p>Find Best PGs in Janakpuri West, Delhi</p>
</header>

<section class="search">
<input type="text" id="searchInput" placeholder="Search PG...">
</section>

<section class="listings" id="pgList"></section>

<section class="form-section">
<h2>Add Your PG</h2>
<form>
<input type="text" placeholder="PG Name" required>
<input type="text" placeholder="Location" required>
<input type="number" placeholder="Monthly Rent" required>
<button type="submit">Submit</button>
</form>
</section>

<script src="script.js"></script>
</body>
</html>
